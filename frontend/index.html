<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tunnel Coupling Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 32px;
      max-width: 560px;
      width: 100%;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: #fff; }
    .buttons { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    button, .upload-btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    button:hover, .upload-btn:hover { opacity: 0.8; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #4466ff; color: white; flex: 1; }
    .btn-secondary { background: #2a2a2a; color: #ccc; border: 1px solid #333; }
    canvas {
      width: 100%;
      height: 180px;
      border-radius: 8px;
      display: none;
      background: #0d0d0d;
    }
    canvas.visible { display: block; }
    .result { margin-top: 20px; display: none; }
    .result.visible { display: block; }
    .t-value { font-size: 2.4rem; font-weight: 700; color: #4466ff; letter-spacing: -0.02em; }
    .t-true { margin-top: 4px; font-size: 0.85rem; color: #555; }
    .error { margin-top: 16px; font-size: 0.85rem; color: #f66; display: none; }
    .error.visible { display: block; }
    .hint { font-size: 0.78rem; color: #555; margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Tunnel Coupling Predictor</h1>

  <div class="buttons">
    <button class="btn-secondary" onclick="loadExample()">Load Example</button>
    <button class="btn-primary" id="predict_btn" onclick="predict()">Predict</button>
  </div>

  <p class="hint">1D array of sensor signal values along a detuning sweep through the interdot transition.</p>
  <textarea id="array_input" placeholder="Paste a 1D array here e.g. [0.1, 0.15, 0.3, ...]"
    style="width:100%;height:60px;margin-bottom:12px;padding:10px;background:#0d0d0d;color:#eee;border:1px solid #333;border-radius:6px;font-family:monospace;font-size:0.75rem;resize:vertical;"
    oninput="handleInput(this.value)"></textarea>

  <canvas id="trace_canvas" width="520" height="180"></canvas>

  <div class="result" id="result">
    <div class="t-value" id="t_value"></div>
    <div class="t-true" id="t_true"></div>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
  var API_URL = (window.location.port === "5500" ? "http://localhost:5000" : "") + "/api/predict";

  var pendingTrueT = null;

  function parseSignal(text) {
    text = text.trim();
    var data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error("Expected a JSON array");
    if (Array.isArray(data[0])) throw new Error("Expected a 1D array, got 2D");
    return data.map(Number);
  }

  function drawTrace(signal) {
    var canvas = document.getElementById("trace_canvas");
    var ctx = canvas.getContext("2d");
    var W = canvas.width, H = canvas.height;
    var pad = { top: 16, bottom: 28, left: 48, right: 16 };
    var plotW = W - pad.left - pad.right;
    var plotH = H - pad.top - pad.bottom;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#0d0d0d";
    ctx.fillRect(0, 0, W, H);

    var min = Math.min(...signal), max = Math.max(...signal);
    var range = max - min || 1;
    var n = signal.length;

    function sx(i) { return pad.left + (i / (n - 1)) * plotW; }
    function sy(v) { return pad.top + plotH - ((v - min) / range) * plotH; }

    // Axes
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + plotH);
    ctx.lineTo(pad.left + plotW, pad.top + plotH);
    ctx.stroke();

    // Centre line (ε = 0)
    var cx = pad.left + plotW / 2;
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = "#444";
    ctx.beginPath();
    ctx.moveTo(cx, pad.top);
    ctx.lineTo(cx, pad.top + plotH);
    ctx.stroke();
    ctx.setLineDash([]);

    // Trace
    ctx.strokeStyle = "#4466ff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx(0), sy(signal[0]));
    for (var i = 1; i < n; i++) ctx.lineTo(sx(i), sy(signal[i]));
    ctx.stroke();

    // Axis labels
    ctx.fillStyle = "#bbb";
    ctx.font = "11px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Detuning  ε", pad.left + plotW / 2, H - 4);
    ctx.fillText("−0.5", pad.left + 4, H - 14);
    ctx.fillText("0", cx, H - 14);
    ctx.fillText("+0.5", pad.left + plotW, H - 14);
    ctx.textAlign = "right";
    ctx.fillText(max.toFixed(3), pad.left - 4, pad.top + 8);
    ctx.fillText(min.toFixed(3), pad.left - 4, pad.top + plotH);

    // Y axis label
    ctx.save();
    ctx.translate(11, pad.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.textAlign = "center";
    ctx.fillText("I(ε)", 0, 0);
    ctx.restore();

    canvas.classList.add("visible");
  }

  function handleInput(text) {
    try {
      var signal = parseSignal(text);
      drawTrace(signal);
      document.getElementById("error").classList.remove("visible");
    } catch (e) {
      // Don't show error while still typing
    }
  }

  async function loadExample() {
    var sampleUrl = (window.location.port === "5500" ? "http://localhost:5000" : "") + "/api/sample";
    try {
      var resp = await fetch(sampleUrl);
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.error || resp.statusText);
      var text = JSON.stringify(data.signal);
      document.getElementById("array_input").value = text;
      drawTrace(data.signal);
      pendingTrueT = data.true_t;
      document.getElementById("t_true").textContent = "True t = " + data.true_t.toFixed(5);
      document.getElementById("t_true").style.display = "block";
      document.getElementById("error").classList.remove("visible");
    } catch (e) {
      document.getElementById("error").textContent = "Could not load sample: " + e.message;
      document.getElementById("error").classList.add("visible");
    }
  }

  async function predict() {
    var raw = document.getElementById("array_input").value.trim();
    var errEl = document.getElementById("error");
    var resultEl = document.getElementById("result");
    var btn = document.getElementById("predict_btn");

    errEl.classList.remove("visible");
    resultEl.classList.remove("visible");

    var signal;
    try {
      signal = parseSignal(raw);
    } catch (e) {
      errEl.textContent = "Invalid input: " + e.message;
      errEl.classList.add("visible");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Predicting…";

    try {
      var resp = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ signal: signal }),
      });
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || data.error || resp.statusText);

      document.getElementById("t_value").textContent = "t = " + data.t.toFixed(4);
      resultEl.classList.add("visible");
    } catch (e) {
      errEl.textContent = "Prediction failed: " + e.message;
      errEl.classList.add("visible");
    } finally {
      btn.disabled = false;
      btn.textContent = "Predict";
    }
  }
</script>
</body>
</html>
