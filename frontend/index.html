      [254,208,116],[254,210,114],[254,212,112],[254,214,109],[254,217,107],[254,219,105],[254,221,102],
      [254,223,100],[254,225,98],[254,227,96],[254,229,93],[254,231,91],[254,233,89],[254,235,87],
      [254,238,84],[254,240,82],[254,242,80],[254,244,78],[254,246,75],[254,248,73],[254,250,71],
      [252,252,68],[250,253,66],[248,253,65],[246,253,64],[244,253,63],[242,253,62],[240,253,61],
      [252,255,164]
    ];
    var i = Math.min(stops.length - 1, Math.max(0, Math.floor(t * (stops.length - 1))));
    return stops[i];
  }

  function drawHeatmap(signal) {
    var canvas = document.getElementById('heatmap');
    var ctx = canvas.getContext('2d');
    var N = signal.length;
    canvas.width = N;
    canvas.height = N;

    var min = Infinity, max = -Infinity;
    for (var r = 0; r < N; r++)
      for (var c = 0; c < N; c++) {
        if (signal[r][c] < min) min = signal[r][c];
        if (signal[r][c] > max) max = signal[r][c];
      }
    var range = max - min || 1;

    var img = ctx.createImageData(N, N);
    for (var r = 0; r < N; r++) {
      for (var c = 0; c < N; c++) {
        var t = (signal[N - 1 - r][c] - min) / range;
        var rgb = inferno(t);
        var idx = (r * N + c) * 4;
        img.data[idx]   = rgb[0];
        img.data[idx+1] = rgb[1];
        img.data[idx+2] = rgb[2];
        img.data[idx+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    canvas.classList.add('visible');
  }

  function loadExample() {
    currentSignal = EXAMPLE;
    pendingTrueT = EXAMPLE_T;
    document.getElementById('array_input').value = JSON.stringify(EXAMPLE);
    drawHeatmap(currentSignal);
    document.getElementById('result').classList.remove('visible');
    document.getElementById('error').classList.remove('visible');
  }

  function handleInput(val) {
    try {
      var data = JSON.parse(val);
      currentSignal = Array.isArray(data) ? data : data.signal;
      pendingTrueT = null;
      drawHeatmap(currentSignal);
      document.getElementById('error').classList.remove('visible');
    } catch(e) {
      // not valid yet, ignore while typing
    }
  }

  async function predict() {
    document.getElementById('error').classList.remove('visible');
    document.getElementById('result').classList.remove('visible');

    var btn = document.getElementById('predict_btn');
    btn.disabled = true;
    btn.textContent = 'Predicting...';

    try {
      var res = await fetch(API + '/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ signal: currentSignal })
      });
      if (!res.ok) throw new Error('API error ' + res.status);
      var data = await res.json();

      document.getElementById('t_value').textContent = 't = ' + data.t.toFixed(5);
      if (pendingTrueT !== null)
        document.getElementById('t_true').textContent = 'true: ' + pendingTrueT.toFixed(5);
      document.getElementById('result').classList.add('visible');
    } catch(err) {
      var el = document.getElementById('error');
      el.textContent = err.message;
      el.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Predict';
    }
  }

</script>
